<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehasport Kursplan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f7f6f3;
    color: #2c2c2a;
    padding: 1.5rem 1rem 2rem;
  }

  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: #3a5244;
  }

  .header p {
    font-size: 0.78rem;
    color: #888;
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding-bottom: 4px;
    margin-bottom: 1.25rem;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 999px;
    border: 1.5px solid #c5d4cc;
    background: white;
    color: #3a5244;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .tab.aktiv {
    background: #3a5244;
    color: white;
    border-color: #3a5244;
  }

  .tab:hover:not(.aktiv) { background: #eef2ef; }

  .kursliste {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 80px;
  }

  .kurs-card {
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid #e8ede9;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .kurs-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(58,82,68,0.08);
  }

  .kurs-zeit {
    font-size: 0.8rem;
    font-weight: 600;
    color: #3a5244;
    min-width: 92px;
    line-height: 1.4;
  }

  .kurs-info { flex: 1; }

  .kurs-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #2c2c2a;
  }

  .kurs-trainer {
    font-size: 0.78rem;
    color: #888;
    margin-top: 2px;
  }

  .kurs-hinweis {
    font-size: 0.72rem;
    color: #b07f3a;
    margin-top: 3px;
    font-style: italic;
  }

  .badge {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .badge-ruecken           { background: #eef4f0; color: #3a5244; }
  .badge-orthogym          { background: #e8f0fb; color: #1a4f8a; }
  .badge-rns               { background: #fef3e2; color: #8a5a0a; }
  .badge-hockergym         { background: #fceef4; color: #8a2a50; }

  .leer {
    text-align: center;
    padding: 2.5rem;
    color: #aaa;
    font-size: 0.9rem;
  }

  .laden {
    text-align: center;
    padding: 2rem;
    color: #aaa;
    font-size: 0.85rem;
  }

  .legende {
    margin-top: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .legende-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: #888;
  }

  .legende-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
  }

  @media (max-width: 480px) {
    .kurs-card { flex-wrap: wrap; gap: 8px; }
    .kurs-zeit { min-width: unset; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Rehasport Kursplan</h1>
  <p>Kursraum C &middot; Etage 5</p>
</div>

<div class="tabs">
  <button class="tab aktiv" onclick="zeigeTag('Montag', this)">Montag</button>
  <button class="tab" onclick="zeigeTag('Dienstag', this)">Dienstag</button>
  <button class="tab" onclick="zeigeTag('Mittwoch', this)">Mittwoch</button>
  <button class="tab" onclick="zeigeTag('Donnerstag', this)">Donnerstag</button>
  <button class="tab" onclick="zeigeTag('Freitag', this)">Freitag</button>
</div>

<div class="kursliste" id="kursliste">
  <div class="laden">Kurse werden geladen...</div>
</div>

<div class="legende">
  <div class="legende-item"><div class="legende-dot" style="background:#3a5244"></div>Rücken</div>
  <div class="legende-item"><div class="legende-dot" style="background:#1a4f8a"></div>Orthogym / TEP</div>
  <div class="legende-item"><div class="legende-dot" style="background:#8a5a0a"></div>Rücken-Nacken-Schulter</div>
  <div class="legende-item"><div class="legende-dot" style="background:#8a2a50"></div>Hockergym</div>
</div>

<script>
let alleKurse = [];
let aktiverTag = 'Montag';

function getBadge(typ) {
  if (!typ) return 'badge-ruecken';
  const t = typ.toLowerCase();
  if (t.includes('orthogym') || t.includes('tep')) return 'badge-orthogym';
  if (t.includes('hockergym') || t.includes('atemgym')) return 'badge-hockergym';
  if (t.includes('nacken')) return 'badge-rns';
  return 'badge-ruecken';
}

function zeigeTag(tag, btn) {
  aktiverTag = tag;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('aktiv'));
  btn.classList.add('aktiv');

  const gefiltert = alleKurse.filter(k => k.Tag === tag);
  const liste = document.getElementById('kursliste');

  if (alleKurse.length === 0) {
    liste.innerHTML = '<div class="laden">Kurse werden geladen...</div>';
    return;
  }

  if (gefiltert.length === 0) {
    liste.innerHTML = '<div class="leer">Keine Kurse an diesem Tag</div>';
    return;
  }

  liste.innerHTML = gefiltert.map(k =>
    '<div class="kurs-card">' +
      '<div class="kurs-zeit">' + k.Uhrzeit_von + ' – ' + k.Uhrzeit_bis + ' Uhr</div>' +
      '<div class="kurs-info">' +
        '<div class="kurs-name">' + k.Kursname + '</div>' +
        '<div class="kurs-trainer">Trainer: ' + k.Trainer + '</div>' +
        (k.Hinweis ? '<div class="kurs-hinweis">' + k.Hinweis + '</div>' : '') +
      '</div>' +
      '<span class="badge ' + getBadge(k.Kurstyp) + '">' + (k.Kurstyp || '') + '</span>' +
    '</div>'
  ).join('');
}

// Kursdaten von Wix Velo empfangen
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'kurse') {
    alleKurse = event.data.daten;
    zeigeTag(aktiverTag, document.querySelector('.tab.aktiv'));
  }
});

// Wix signalisieren dass das iFrame bereit ist
window.addEventListener('load', function() {
  window.parent.postMessage({ type: 'bereit' }, '*');
});
</script>
</body>
</html>
