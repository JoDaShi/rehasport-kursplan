<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehasport Kursplan</title>
<style>
/* Montserrat self-hosted – keine externe Verbindung, DSGVO-konform */
@font-face {
  font-family: 'Montserrat';
  font-style: normal;
  font-weight: 400 800;
  font-display: swap;
  src: local('Montserrat'), local('Montserrat-Regular'),
       url('https://JoDaShi.github.io/rehasport-kursplan/Montserrat.woff2') format('woff2');
}

/* Fallback-Stack falls Schrift noch nicht geladen: Nunito > Trebuchet > System */
:root {
  --font: 'Montserrat', 'Nunito', 'Trebuchet MS', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: #f0efea;
  color: #2c2c2a;
}

.header {
  background: #5a7265;
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.header-left h1 {
  font-size: 2rem;
  font-weight: 800;
  color: white;
  letter-spacing: -0.5px;
}

.header-left p {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 2px;
}

.kursraum-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 999px;
  padding: 5px 12px;
  font-size: 0.72rem;
  font-weight: 600;
  color: white;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.c-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #c9a84c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: white;
}

.day-nav {
  background: #4d6358;
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.day-btn {
  flex: 1;
  padding: 10px 4px;
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.15s;
}

.day-btn.aktiv {
  color: white;
  border-bottom-color: #c9a84c;
}

.day-btn:hover:not(.aktiv) {
  color: rgba(255,255,255,0.85);
}

.plan-wrapper {
  padding: 1.5rem;
  max-width: 960px;
  margin: 0 auto;
}

.plan-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.plan-single { display: none; }

.tag-spalte { display: flex; flex-direction: column; gap: 7px; }

.tag-header {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: white;
  background: #5a7265;
  padding: 6px 8px;
  border-radius: 6px;
  text-align: center;
}

.kurs-card {
  background: white;
  border-radius: 8px;
  padding: 9px 10px;
  border: 1px solid #e0ddd6;
  border-left: 3px solid #5a7265;
}

.kurs-card.nachmittag {
  border-left-color: #c9a84c;
}

.kurs-zeit {
  font-size: 0.63rem;
  font-weight: 600;
  color: #5a7265;
  margin-bottom: 3px;
}

.kurs-card.nachmittag .kurs-zeit {
  color: #c9a84c;
}

.kurs-name {
  font-size: 0.72rem;
  font-weight: 700;
  color: #2c2c2a;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.3;
}

.kurs-trainer {
  font-size: 0.65rem;
  color: #999;
  margin-top: 3px;
  font-weight: 500;
}

.kurs-hinweis {
  font-size: 0.6rem;
  color: #c9a84c;
  margin-top: 2px;
  font-style: italic;
}

.kurs-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 5px;
}

.room-badge {
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: #c9a84c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5rem;
  font-weight: 700;
  color: white;
}

.trennlinie {
  height: 1px;
  background: #e8e5de;
  border: none;
  margin: 2px 0;
}

.leer-tag {
  font-size: 0.7rem;
  color: #ccc;
  text-align: center;
  padding: 0.75rem 0;
  font-weight: 500;
}

.laden {
  grid-column: 1 / -1;
  text-align: center;
  padding: 3rem;
  color: #aaa;
  font-size: 0.85rem;
}

.legende {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 0 1.5rem 1.5rem;
  max-width: 960px;
  margin: 0 auto;
}

.legende-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.63rem;
  font-weight: 600;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.legende-linie {
  width: 18px;
  height: 3px;
  border-radius: 2px;
}

@media (max-width: 699px) {
  .plan-grid { display: none; }
  .plan-single { display: block; }
  .header { padding: 1rem; }
  .header-left h1 { font-size: 1.4rem; }
  .plan-wrapper { padding: 1rem; }
  .tag-spalte { gap: 8px; }
  .kurs-card { padding: 10px 12px; }
  .kurs-name { font-size: 0.8rem; }
  .kurs-zeit { font-size: 0.7rem; }
  .kurs-trainer { font-size: 0.7rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Rehasport</h1>
    <p>Kursplan · Stand Nov. 2025</p>
  </div>
  <div class="header-right">
    <div class="kursraum-badge">
      <div class="c-dot">C</div>
      Kursraum C · Etage 5
    </div>
  </div>
</div>

<div class="day-nav" id="dayNav">
  <button class="day-btn aktiv" onclick="setTag('Montag',this)">Mo</button>
  <button class="day-btn" onclick="setTag('Dienstag',this)">Di</button>
  <button class="day-btn" onclick="setTag('Mittwoch',this)">Mi</button>
  <button class="day-btn" onclick="setTag('Donnerstag',this)">Do</button>
  <button class="day-btn" onclick="setTag('Freitag',this)">Fr</button>
</div>

<div class="plan-wrapper">
  <div class="plan-grid" id="planGrid">
    <div class="laden">Kurse werden geladen...</div>
  </div>
  <div class="plan-single" id="planSingle"></div>
</div>

<div class="legende">
  <div class="legende-item"><div class="legende-linie" style="background:#5a7265"></div>Vormittag</div>
  <div class="legende-item"><div class="legende-linie" style="background:#c9a84c"></div>Nachmittag</div>
</div>

<script>
const TAGE = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
let alleKurse = [];
let aktiverTag = 'Montag';

function istVormittag(zeit) {
  if (!zeit) return true;
  return parseInt(zeit.split(':')[0]) < 13;
}

function karteHTML(k) {
  const vm = istVormittag(k.uhrzeit_von);
  return '<div class="kurs-card ' + (vm ? '' : 'nachmittag') + '">' +
    '<div class="kurs-zeit">' + (k.uhrzeit_von||'') + ' – ' + (k.uhrzeit_bis||'') + ' Uhr</div>' +
    '<div class="kurs-name">' + (k.kursname||k.Kursname||'') + '</div>' +
    '<div class="kurs-trainer">' + (k.trainer||'') + '</div>' +
    (k.hinweis ? '<div class="kurs-hinweis">' + k.hinweis + '</div>' : '') +
    '<div class="kurs-footer"><div class="room-badge">C</div></div>' +
  '</div>';
}

function renderDesktop() {
  const grid = document.getElementById('planGrid');
  if (!alleKurse.length) {
    grid.innerHTML = '<div class="laden">Kurse werden geladen...</div>';
    return;
  }
  grid.innerHTML = TAGE.map(tag => {
    const kurse = alleKurse.filter(k => k.tag === tag);
    const vm = kurse.filter(k => istVormittag(k.uhrzeit_von));
    const nm = kurse.filter(k => !istVormittag(k.uhrzeit_von));
    return '<div class="tag-spalte">' +
      '<div class="tag-header">' + tag + '</div>' +
      vm.map(karteHTML).join('') +
      (vm.length && nm.length ? '<hr class="trennlinie">' : '') +
      nm.map(karteHTML).join('') +
      (!kurse.length ? '<div class="leer-tag">–</div>' : '') +
    '</div>';
  }).join('');
}

function renderMobile(tag) {
  const el = document.getElementById('planSingle');
  const kurse = alleKurse.filter(k => k.tag === tag);
  if (!kurse.length) {
    el.innerHTML = '<div class="leer-tag">Keine Kurse an diesem Tag</div>';
    return;
  }
  el.innerHTML = '<div class="tag-spalte">' + kurse.map(karteHTML).join('') + '</div>';
}

function setTag(tag, btn) {
  aktiverTag = tag;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('aktiv'));
  btn.classList.add('aktiv');
  renderMobile(tag);
}

window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'kurse') {
    alleKurse = event.data.daten;
    renderDesktop();
    renderMobile(aktiverTag);
  }
});

window.addEventListener('load', function() {
  window.parent.postMessage({ type: 'bereit' }, '*');
});
</script>
</body>
</html>
